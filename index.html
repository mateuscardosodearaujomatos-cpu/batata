<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teste de QI</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.container {
  width: 90%;
  max-width: 500px;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

button {
  background: #22c55e;
  border: none;
  padding: 10px 20px;
  color: white;
  cursor: pointer;
  border-radius: 5px;
  margin-top: 15px;
}

button:hover {
  background: #16a34a;
}

.opcao {
  display: block;
  margin: 8px 0;
  padding: 10px;
  background: #334155;
  border-radius: 5px;
  cursor: pointer;
}

.opcao:hover {
  background: #475569;
}
</style>
</head>

<body>

<div class="container" id="app">
  <h2>Teste de QI</h2>
  <button onclick="iniciar()">Começar Teste</button>
</div>

<script>
let perguntaAtual = 0;
let respostas = [];

const perguntas = Array.from({length: 32}, (_, i) => ({
  pergunta: `Pergunta ${i+1}: Qual número completa a sequência ${i}, ${i+2}, ${i+4}, ?`,
  opcoes: [i+6, i+5, i+7, i+8],
  correta: 0
}));

function iniciar() {
  perguntaAtual = 0;
  respostas = [];
  mostrarPergunta();
}

function mostrarPergunta() {
  let p = perguntas[perguntaAtual];

  document.getElementById("app").innerHTML = `
    <h3>Pergunta ${perguntaAtual + 1} de 32</h3>
    <p>${p.pergunta}</p>
    ${p.opcoes.map((op, i) => `
      <div class="opcao" onclick="responder(${i})">${op}</div>
    `).join("")}
  `;
}

function responder(opcao) {
  respostas.push(opcao);
  perguntaAtual++;

  if (perguntaAtual < 32) {
    mostrarPergunta();
  } else {
    telaPagamento();
  }
}

function telaPagamento() {
  document.getElementById("app").innerHTML = `
    <h2>Resultado pronto!</h2>
    <p>Para ver seu resultado, pague R$ 5,00</p>
    <button onclick="pagar()">Pagar com PIX</button>
  `;
}

function pagar() {
  mostrarResultado();
}

function mostrarResultado() {
  let acertos = respostas.filter((r, i) => r === perguntas[i].correta).length;
  let qi = 80 + acertos;

  let nivel = "Médio";
  if (qi > 110) nivel = "Alto";
  if (qi > 130) nivel = "Muito alto";

  document.getElementById("app").innerHTML = `
    <h2>Seu QI: ${qi}</h2>
    <p>Nível: ${nivel}</p>
  `;
}
</script>

</body>
</html>
